
name: Scraper build
on:
  push:
    branches: [ "main" ]
    
  workflow_dispatch: 
  
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      run: ./gradlew :scraper:jib --image=ghcr.io/tschy/classifieds-scraper:${{ github.run_number }}

    - name: Update Railway Image
  
      run: |
        railway variables set DOCKER_IMAGE_TAG=${{ github.run_number }}
        railway redeploy
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
